<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Smart Study Planner</title>

  <link rel="stylesheet" href="style.css">

  <style>

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .login-container{
      width:100%;
      max-width:420px;
      animation: fadeIn 1s ease;
    }

    .login-card{
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(14px);
      padding:35px;
      border-radius:25px;
      box-shadow:0 10px 40px rgba(0,0,0,0.1);
      text-align:center;
    }

    .login-card h1{
      margin-bottom:10px;
      font-size:32px;

      background: linear-gradient(90deg,#ec4899,#6366f1);

      -webkit-background-clip:text;
      background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .login-card p{
      margin-bottom:25px;
      color:#64748b;
    }

    .login-card input{
      margin-top:15px;
    }

    .login-btn{
      margin-top:20px;
    }

    .switch-text{
      margin-top:20px;
      font-size:14px;
      color:#64748b;
    }

    .switch-text span{
      color:#ec4899;
      font-weight:600;
      cursor:pointer;
    }

    .welcome-icon{
      font-size:60px;
      margin-bottom:15px;
      animation: float 3s infinite;
    }

    .hidden-form{
      display:none;
    }

  </style>
</head>

<body>

  <div class="login-container">

    <!-- LOGIN CARD -->
    <div class="login-card">

      <div class="welcome-icon">📚</div>

      <h1>Smart Study Planner</h1>
      <p>Your Personal Productivity Companion</p>

      <!-- LOGIN FORM -->
      <div id="loginForm">

        <input type="text" id="loginUser" placeholder="Enter Username">

       <input type="password" id="loginPass" placeholder="Enter Password">

<!-- MESSAGE BOX -->
<div id="loginMessage" style="
  margin-top:10px;
  font-size:14px;
  font-weight:600;
  color:#ef4444;
  text-align:left;
"></div>

<button class="login-btn" onclick="loginUser()">
  Login
</button>
        <button onclick="showResetBox()">
  Forgot Password?
</button>

<div id="resetBox" class="hidden-form">

  <input type="text" id="resetUser" placeholder="Enter Username">

  <input type="password" id="newPass" placeholder="Enter New Password">

  <button onclick="saveNewPassword()">
    Reset Password
  </button>

</div>

        <div class="switch-text">
          Don't have an account?
          <span onclick="showSignup()">Signup</span>
        </div>

      </div>

      <!-- SIGNUP FORM -->
      <div id="signupForm" class="hidden-form">

        <input type="text" id="signupUser" placeholder="Create Username">

        <input type="password" id="signupPass" placeholder="Create Password">

        <button class="login-btn" onclick="signupUser()">
          Create Account
        </button>

        <div class="switch-text">
          Already have an account?
          <span onclick="showLogin()">Login</span>
        </div>

      </div>

    </div>

  </div>

<script>

  function showSignup(){
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("signupForm").style.display = "block";
  }

  function showLogin(){
    document.getElementById("signupForm").style.display = "none";
    document.getElementById("loginForm").style.display = "block";
  }

  /* ================= SIGNUP ================= */

  function signupUser(){

    let username =
      document.getElementById("signupUser").value.trim();

    let password =
      document.getElementById("signupPass").value.trim();

    if(!username || !password){
      alert("Please fill all fields");
      return;
    }

    let users =
      JSON.parse(localStorage.getItem("users")) || {};

    if(users[username]){
      alert("User already exists");
      return;
    }

    users[username] = {
      password: password,
      streak: 0,
      lastDate: ""
    };

    localStorage.setItem("users", JSON.stringify(users));

    alert("Signup successful!");

    showLogin();
  }

  /* ================= LOGIN ================= */

  function loginUser(){

  let username =
    document.getElementById("loginUser").value.trim();

  let password =
    document.getElementById("loginPass").value.trim();

  let message =
    document.getElementById("loginMessage");

  let users =
    JSON.parse(localStorage.getItem("users")) || {};

  if(!username || !password){
    message.style.color = "#ef4444";
    message.innerText = "Please fill all fields";
    return;
  }

  if(
    !users[username] ||
    users[username].password !== password
  ){
    message.style.color = "#ef4444";
    message.innerText = "Invalid username or password";
    return;
  }

  message.style.color = "#22c55e";
  message.innerText = "Login successful! Redirecting...";

  localStorage.setItem("currentUser", username);

  setTimeout(() => {
    window.location.href = "index.html";
  }, 1000);
}

  function showResetBox(){

  let box = document.getElementById("resetBox");

  if(box.style.display === "block"){
    box.style.display = "none";
  } else {
    box.style.display = "block";
  }
}

function saveNewPassword(){

  let username =
    document.getElementById("resetUser").value.trim();

  let password =
    document.getElementById("newPass").value.trim();

  let users =
    JSON.parse(localStorage.getItem("users")) || {};

  if(!users[username]){
    alert("User not found");
    return;
  }

  if(password.length < 3){
    alert("Password too short");
    return;
  }

  users[username].password = password;

  localStorage.setItem("users", JSON.stringify(users));

  alert("Password updated successfully!");

  document.getElementById("resetBox").style.display = "none";
}

</script>

</body>
</html>
